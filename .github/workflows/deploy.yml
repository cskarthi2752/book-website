name: Build Docker Image & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker Image
        run: docker build -t frontend-app-1 .

      - name: Tag Docker Image
        run: |
          docker tag frontend-app-1:latest 274193347344.dkr.ecr.ap-south-1.amazonaws.com/frontend-app-1:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 274193347344.dkr.ecr.ap-south-1.amazonaws.com/frontend-app-1:latest
